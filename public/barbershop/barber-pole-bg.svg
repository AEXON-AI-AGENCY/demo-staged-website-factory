      <stop offset="0.16" stop-color="#c8c2b6" stop-opacity="0.22"/>
      <stop offset="0.48" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="0.72" stop-color="#a07a3c" stop-opacity="0.18"/>
