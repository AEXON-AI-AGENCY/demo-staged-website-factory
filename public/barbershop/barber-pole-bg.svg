      <rect width="220" height="220" fill="#fff7ea"/>
      <rect x="-40" y="0" width="78" height="260" fill="#b93a2f"/>
      <rect x="92" y="-20" width="78" height="260" fill="#b93a2f"/>
      <rect x="224" y="-20" width="78" height="260" fill="#b93a2f"/>
    </pattern>
    <linearGradient id="cylinder" x1="0" x2="1" y1="0" y2="0">
